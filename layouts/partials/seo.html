<!-- ═══════════════════════════════════════════════════════════════════════
     SecureGuard — SEO Partial
     Open Graph, Twitter Cards, canonical, structured data
     ═══════════════════════════════════════════════════════════════════════ -->

<!-- Canonical URL -->
<link rel="canonical" href="{{ .Permalink }}"/>

<!-- Basic Meta -->
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}"/>
<meta name="author" content="{{ .Site.Params.author }}"/>
<meta name="robots" content="index, follow"/>

<!-- Open Graph -->
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | SecureGuard{{ end }}"/>
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}"/>
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}"/>
<meta property="og:url" content="{{ .Permalink }}"/>
<meta property="og:site_name" content="SecureGuard"/>
{{ with .Site.Params.ogImage }}<meta property="og:image" content="{{ . | absURL }}"/>{{ end }}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | SecureGuard{{ end }}"/>
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}"/>
{{ with .Site.Params.ogImage }}<meta name="twitter:image" content="{{ . | absURL }}"/>{{ end }}

<!-- JSON-LD Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "SecureGuard",
  "description": "{{ .Site.Params.description }}",
  "url": "{{ .Site.BaseURL }}"
}
</script>
